# AI Hub 「명령어 음성(노인남녀)」 라벨 필터·샘플링 (학습량 조절용)
# preprocess_zip / scripts/build_elderly_command_allowlist.py 에서 공통 사용

quality_good_only: true
# 전사 품질 메타가 있고 Good 이 아니면 제외. 필드 없음 → 통과(보수적으로 포함).

exclude_not_provided_dialect: true
# 화자정보.Dialect 에 NotProvided 등 이 들어간 라벨 제외

exclude_irregular_zip: true
# 파일명에 「비정형」 이 들어간 라벨 zip 통째로 스킵

exclude_validation_zip: true

validation_zip_only: false

random_seed: 42

# 라벨 zip 하나당 유지 비율 (0~1]. 1 이면 샘플링 없음
sample_fraction_per_label_zip: 0.45

# zip당 최대 유지 건수 (샘플링 후 적용). null 이면 무제한
max_samples_per_label_zip: 120000
